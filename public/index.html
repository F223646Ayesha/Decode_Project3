<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>BookTracker | Project 3 - DecodeLabs</title>
<link rel="stylesheet" href="css/style.css" />
</head>
<body>
  <nav class="navbar">
    <div class="brand">📚 BookTracker</div>
    <div class="nav-links">
      <a href="index.html">Home</a>
      <a href="books.html">Books</a>
      <span id="navUser"></span>
    </div>
  </nav>

  <main class="container">
    <section class="hero">
      <h1>Track what you read. Rate what matters.</h1>
      <p>Project 3 — Database Integration | DecodeLabs Full Stack Internship</p>
    </section>

    <section class="auth-grid">
      <div class="card">
        <h2>Register</h2>
        <form id="registerForm">
          <input type="text" id="regUsername" placeholder="Username" required minlength="3" />
          <input type="email" id="regEmail" placeholder="Email" required />
          <input type="password" id="regPassword" placeholder="Password" required minlength="6" />
          <button type="submit">Create Account</button>
        </form>
      </div>

      <div class="card">
        <h2>Login</h2>
        <form id="loginForm">
          <input type="email" id="loginEmail" placeholder="Email" required />
          <input type="password" id="loginPassword" placeholder="Password" required />
          <button type="submit">Login</button>
        </form>
      </div>
    </section>

    <p id="message" class="message"></p>
  </main>

  <script src="js/api.js"></script>
  <script src="js/auth.js"></script>
</body>
</html>
